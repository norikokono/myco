<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Myco</title>

<link rel="stylesheet" href="game.css">

</head>

<body>

<div id="game">

    <!-- ========================= -->
    <!-- TOP HUD -->
    <!-- ========================= -->

    <header id="hud">

        <div class="hud-left">

            <div class="logo">

                🍄 Myco

            </div>

        </div>

        <div class="hud-center">

            <div id="quest">

                Find the Impossible Mushroom

            </div>

        </div>

        <div class="hud-right">

            <div id="health">

                ❤️❤️❤️

            </div>

            <div id="score">

                ⭐ 0

            </div>

        </div>

    </header>



    <!-- ========================= -->
    <!-- GAME AREA -->
    <!-- ========================= -->

    <main id="viewport">

        <!-- camera -->

        <div id="camera">

            <!-- world -->

            <div id="world">

            </div>

        </div>

    </main>



    <!-- ========================= -->
    <!-- MYCO DIALOG -->
    <!-- ========================= -->

    <div id="dialog">

        <div id="portrait">

            🍄

        </div>

        <div id="dialogText">

            Welcome to the forest...

        </div>

    </div>



    <!-- ========================= -->
    <!-- INVENTORY -->
    <!-- ========================= -->

    <aside id="inventory">

        <h2>

            Inventory

        </h2>

        <ul id="inventoryList">

        </ul>

    </aside>



    <!-- ========================= -->
    <!-- WORLD MAP -->
    <!-- ========================= -->

    <div id="worldMap">

        <h2>

            Forest Map

        </h2>

        <div id="mapNodes">

        </div>

    </div>



    <!-- ========================= -->
    <!-- LOADING -->
    <!-- ========================= -->

    <div id="loading">

        Loading Forest...

    </div>

</div>

<script src="game.js"></script>

</body>

</html>
