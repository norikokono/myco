<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myco 2.0</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #050812;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .noscript {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 2rem;
            color: #f5fff9;
            font-family: system-ui, sans-serif;
            text-align: center;
            background: #050812;
        }
    </style>
</head>
<body>
    <iframe src="ui/game.html" title="Myco 2.0 playable game"></iframe>
    <noscript>
        <div class="noscript">
            Myco 2.0 needs JavaScript enabled. Open <a href="ui/game.html">the standalone game page</a> after enabling JavaScript.
        </div>
    </noscript>
</body>
</html>
